worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Rate limiting zone: 100 req/min per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

    # Upstream definitions
    upstream user_service     { server user-service:8001; }
    upstream product_service  { server product-service:8002; }
    upstream order_service    { server order-service:8003; }
    upstream payment_service  { server payment-service:8004; }
    upstream notification_service { server notification-service:8005; }
    upstream inventory_service { server inventory-service:8006; }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'none'" always;

        # Apply rate limiting globally
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        # Hide Nginx version
        server_tokens off;

        # User Service
        location /api/users/ {
            proxy_pass         http://user_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Product Service (public read, protected write handled in service)
        location /api/products/ {
            proxy_pass         http://product_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Order Service (authenticated)
        location /api/orders/ {
            proxy_pass         http://order_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Cart (part of Order Service)
        location /api/cart/ {
            proxy_pass         http://order_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Payment Service (authenticated)
        location /api/payments/ {
            proxy_pass         http://payment_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Inventory Service
        location /api/inventory/ {
            proxy_pass         http://inventory_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Health check endpoints (internal)
        location /health {
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # Block access to internal paths
        location ~ /\. {
            deny all;
        }

        # 404 fallback
        location / {
            return 404 '{"error":"Not found"}';
            add_header Content-Type application/json;
        }
    }
}
