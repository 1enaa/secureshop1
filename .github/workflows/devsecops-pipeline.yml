name: Full DevSecOps Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:

# =========================
# 1. SAST (Static Analysis)
# =========================
  sast:
    name: SAST (Semgrep + Bandit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install tools
        run: |
          pip install semgrep bandit

      - name: Run Semgrep
        run: semgrep scan --config auto --sarif > semgrep.sarif

      - name: Run Bandit (Python SAST)
        run: bandit -r . -f json -o bandit.json


# =========================
# 2. SCA (Dependency Scan)
# =========================
  sca:
    name: SCA (Trivy FS Scan)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          format: sarif
          output: trivy-fs.sarif


# =========================
# 3. Secrets Detection
# =========================
  secrets:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_FORMAT: sarif
          GITLEAKS_REPORT_PATH: gitleaks.sarif


# =========================
# 4. IaC Security (Checkov)
# =========================
  iac:
    name: IaC Scan (Checkov)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov
        run: checkov -d . -o sarif > checkov.sarif


# =========================
# 5. Build Docker Image
# =========================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [sast, sca, secrets, iac]

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t secureshop:latest .


# =========================
# 6. Container Scan (Trivy)
# =========================
  container_scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t secureshop:latest .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: secureshop:latest
          format: sarif
          output: trivy-image.sarif


# =========================
# 7. SBOM Generation (Syft)
# =========================
  sbom:
    name: Generate SBOM (Syft)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM
        run: |
          docker run --rm -v $PWD:/workspace anchore/syft dir:/workspace -o cyclonedx-json > sbom.json


# =========================
# 8. DAST (OWASP ZAP)
# =========================
  dast:
    name: DAST Scan (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Start app
        run: docker compose up -d

      - name: Run ZAP Baseline Scan
        run: |
          docker run --rm -t zaproxy/zap-stable zap-baseline.py \
          -t http://host.docker.internal:8000 \
          -r zap-report.html || true


# =========================
# 9. Upload SARIF Reports (GitHub Security Tab)
# =========================
  report:
    name: Upload Security Reports
    runs-on: ubuntu-latest
    needs: [sast, sca, secrets, iac]

    steps:
      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif

      - name: Upload Trivy FS SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

      - name: Upload Trivy Image SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif

      - name: Upload Gitleaks SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif