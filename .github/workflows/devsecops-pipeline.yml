name: Full DevSecOps Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:

# =========================
# 1. SAST (Static Analysis)
# =========================
  sast:
    name: SAST (Semgrep + Bandit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep scan --config auto --json > semgrep-report.json

      - name: Run Bandit (Python SAST)
        run: |
          pip install bandit
          bandit -r . -f json -o bandit-report.json

# =========================
# 2. SCA (Dependency Scan)
# =========================
  sca:
    name: SCA (Trivy FS Scan)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          format: json
          output: trivy-fs.json

# =========================
# 3. Secrets Detection
# =========================
  secrets:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_FORMAT: json
          GITLEAKS_REPORT_PATH: gitleaks-report.json

# =========================
# 4. IaC Security (Checkov)
# =========================
  iac:
    name: IaC Scan (Checkov)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        run: |
          pip install checkov
          checkov -d . -o json > checkov-report.json

# =========================
# 5. Build Docker Image
# =========================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [sast, sca, secrets, iac]

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t secureshop:latest .

# =========================
# 6. Container Scan (Trivy)
# =========================
  container_scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t secureshop:latest .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: secureshop:latest
          format: json
          output: trivy-image.json

# =========================
# 7. SBOM Generation (Syft)
# =========================
  sbom:
    name: Generate SBOM (Syft)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM
        run: |
          docker run --rm -v $PWD:/workspace anchore/syft dir:/workspace -o cyclonedx-json > sbom.json

# =========================
# 8. DAST (OWASP ZAP)
# =========================
  dast:
    name: DAST Scan (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Start app (docker-compose)
        run: docker compose up -d

      - name: Run ZAP Baseline Scan
        run: |
          docker run --rm -t zaproxy/zap-stable zap-baseline.py \
          -t http://host.docker.internal:8000 \
          -r zap-report.html || true

# =========================
# 9. Upload SARIF Reports
# =========================
  report:
    name: Upload Security Reports
    runs-on: ubuntu-latest
    needs: [sast, sca, secrets, iac]

    steps:
      - uses: actions/checkout@v4

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif