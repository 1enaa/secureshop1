name: SecureShop DevSecOps Pipeline

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/secureshop

jobs:

  # ─────────────────────────────────────────────
  #  SECRET SCANNING
  # ─────────────────────────────────────────────

  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_REPORT_FORMAT: json
          GITLEAKS_REPORT_PATH: gitleaks-report.json

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

  trufflehog-scan:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Run TruffleHog via Docker and redirect JSON output to a file.
      # The action's extra_args field does not support shell redirects,
      # so we use a run: step with docker directly instead.
      - name: Run TruffleHog (filesystem mode)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/pwd" \
            ghcr.io/trufflesecurity/trufflehog:latest \
            filesystem /pwd \
            --only-verified \
            --json \
            2>/dev/null | tee trufflehog-report.json || true

      - name: Upload TruffleHog report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-report
          path: trufflehog-report.json

  # ─────────────────────────────────────────────
  #  SAST
  # ─────────────────────────────────────────────

  sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    needs: [secret-scan, trufflehog-scan]
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/nodejs
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif

  # ─────────────────────────────────────────────
  #  SCA
  # ─────────────────────────────────────────────

  sca:
    name: SCA (Dependency-Check)
    runs-on: ubuntu-latest
    needs: [secret-scan, trufflehog-scan]
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          for svc in user-service product-service order-service payment-service notification-service inventory-service; do
            cd $svc && npm ci && cd ..
          done

      - name: Run Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: secureshop
          path: .
          format: SARIF HTML
          out: dependency-check-report
          args: "--enableRetired"

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: dependency-check-report

      - name: Upload Dependency-Check reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: dependency-check-report/

  # ─────────────────────────────────────────────
  #  IaC SCAN
  # ─────────────────────────────────────────────

  iac-scan:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    needs: [secret-scan, trufflehog-scan]
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: all
          output_format: sarif cli
          output_file_path: checkov.sarif
          soft_fail: true

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif

      - name: Upload Checkov SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-sarif
          path: checkov.sarif

  # ─────────────────────────────────────────────
  #  PYTHON SAST
  # ─────────────────────────────────────────────

  bandit:
    name: Bandit Python SAST
    runs-on: ubuntu-latest
    needs: [secret-scan, trufflehog-scan]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit (JSON)
        run: bandit -r . -f json -o bandit-report.json || true

      - name: Run Bandit (HTML)
        run: bandit -r . -f html -o bandit-report.html || true

      - name: Upload Bandit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: |
            bandit-report.json
            bandit-report.html

  # ─────────────────────────────────────────────
  #  BUILD
  # ─────────────────────────────────────────────

  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [sast, sca, iac-scan, bandit]
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        service:
          - user-service
          - product-service
          - order-service
          - payment-service
          - notification-service
          - inventory-service
          - api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/secureshop-${{ matrix.service }}:latest

  # ─────────────────────────────────────────────
  #  CONTAINER SCAN
  # ─────────────────────────────────────────────

  container-scan:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      matrix:
        service:
          - user-service
          - product-service
          - order-service
          - payment-service
          - notification-service
          - inventory-service
          - api-gateway
    steps:
      - name: Run Trivy (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/secureshop-${{ matrix.service }}:latest
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Run Trivy (table)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/secureshop-${{ matrix.service }}:latest
          format: table
          output: trivy-${{ matrix.service }}.txt
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.service }}
          path: |
            trivy-${{ matrix.service }}.sarif
            trivy-${{ matrix.service }}.txt

  # ─────────────────────────────────────────────
  #  SBOM
  # ─────────────────────────────────────────────

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        service:
          - user-service
          - product-service
          - order-service
          - payment-service
          - notification-service
          - inventory-service
          - api-gateway
    steps:
      - uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/secureshop-${{ matrix.service }}:latest
          artifact-name: sbom-${{ matrix.service }}.spdx.json

  # ─────────────────────────────────────────────
  #  DAST
  # ─────────────────────────────────────────────

  dast:
    name: OWASP ZAP DAST
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: |
          docker compose up -d --build
          sleep 40

      - name: Run ZAP baseline
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: http://localhost
          cmd_options: "-a"
          fail_action: false
          report_html: zap-report.html
          report_json: zap-report.json
          report_md: zap-report.md

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: |
            zap-report.html
            zap-report.json
            zap-report.md

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────────
  #  SUMMARY
  # ─────────────────────────────────────────────

  pipeline-summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [secret-scan, trufflehog-scan, sast, sca, iac-scan, bandit, build, container-scan, sbom, dast]
    if: always()
    steps:
      - name: Summary
        run: echo "SecureShop DevSecOps pipeline completed"