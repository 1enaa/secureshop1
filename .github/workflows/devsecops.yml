name: SecureShop DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/secureshop

jobs:

  # ─────────────────────────────
  # 1. SECRET SCANNING
  # ─────────────────────────────
  secret-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────
  # 2. SAST (Semgrep)
  # ─────────────────────────────
  sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    needs: secret-scan
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/nodejs
          generateSarif: "1"

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  # ─────────────────────────────
  # 3. SCA (Dependency + Trivy FS)
  # ─────────────────────────────
  sca:
    name: SCA Scan
    runs-on: ubuntu-latest
    needs: secret-scan
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          for svc in user-service product-service order-service payment-service notification-service inventory-service; do
            cd $svc && npm ci && cd ..
          done

      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: secureshop
          path: .
          format: SARIF
          out: dependency-report
          args: "--enableRetired"

      - name: Upload Dependency SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: dependency-report

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

  # ─────────────────────────────
  # 4. IAC (Checkov)
  # ─────────────────────────────
  iac-scan:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    needs: secret-scan
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile
          output_format: sarif
          output_file_path: checkov.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif

  # ─────────────────────────────
  # 5. BANDIT (FIXED)
  # ─────────────────────────────
  bandit:
    name: Bandit Python SAST
    runs-on: ubuntu-latest
    needs: secret-scan

    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit (SARIF)
        run: |
          bandit -r . -f sarif -o bandit.sarif || true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit.sarif

  # ─────────────────────────────
  # 6. BUILD
  # ─────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [sast, sca, iac-scan, bandit]
    permissions:
      packages: write
      contents: read

    strategy:
      matrix:
        service:
          - user-service
          - product-service
          - order-service
          - payment-service
          - notification-service
          - inventory-service
          - api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t test:${{ matrix.service }} ./${{ matrix.service }}

  # ─────────────────────────────
  # 7. TRIVY IMAGE SCAN
  # ─────────────────────────────
  container-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: build

    permissions:
      security-events: write
      contents: read

    steps:
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: test:user-service
          format: sarif
          output: trivy-image.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif