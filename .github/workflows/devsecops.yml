name: SecureShop DevSecOps Pipeline

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/secureshop

jobs:

  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ✅ NEW: TruffleHog runs in parallel with Gitleaks
  trufflehog-scan:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    needs: [secret-scan, trufflehog-scan]  # ✅ waits for both secret scanners
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/nodejs
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  sca:
    name: SCA (Dependency-Check)
    runs-on: ubuntu-latest
    needs: [secret-scan, trufflehog-scan]  # ✅ updated
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          for svc in user-service product-service order-service payment-service notification-service inventory-service; do
            cd $svc && npm ci && cd ..
          done
      - name: Run Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: secureshop
          path: .
          format: SARIF HTML
          out: dependency-check-report
          args: "--enableRetired"
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: dependency-check-report

  iac-scan:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    needs: [secret-scan, trufflehog-scan]  # ✅ updated
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile,docker-compose  # ✅ FIXED: added docker-compose
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif

  bandit:
    name: Bandit Python SAST
    runs-on: ubuntu-latest
    needs: [secret-scan, trufflehog-scan]  # ✅ updated
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit (JSON)
        run: bandit -r . -f json -o bandit-report.json
      - name: Upload Bandit Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [sast, sca, iac-scan, bandit]
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        service:
          - user-service
          - product-service
          - order-service
          - payment-service
          - notification-service
          - inventory-service
          - api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/secureshop-${{ matrix.service }}:latest

  container-scan:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      matrix:
        service:
          - user-service
          - product-service
          - order-service
          - payment-service
          - notification-service
          - inventory-service
          - api-gateway
    steps:
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/secureshop-${{ matrix.service }}:latest
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/secureshop-user-service:latest

  dast:
    name: OWASP ZAP DAST
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Start services
        run: |
          docker compose up -d --build
          sleep 40
      - name: Run ZAP baseline
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: http://localhost
          cmd_options: "-a"
          fail_action: false
      - name: Tear down
        if: always()
        run: docker compose down -v

  pipeline-summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [secret-scan, trufflehog-scan, sast, sca, iac-scan, bandit, build, container-scan, sbom, dast]  # ✅ updated
    if: always()
    steps:
      - name: Summary
        run: echo "SecureShop DevSecOps pipeline completed"