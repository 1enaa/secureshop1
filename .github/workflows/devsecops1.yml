name: SecureShop Full DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

# ─────────────────────────────────────────────
jobs:

# =========================
# 1. SAST (Semgrep + Bandit)
# =========================
  sast:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install SAST tools
        run: |
          pip install semgrep bandit

      - name: Run Semgrep
        run: semgrep scan --config auto --json > semgrep.json || true

      - name: Run Bandit
        run: bandit -r . -f json -o bandit.json || true


# =========================
# 2. SCA (Trivy filesystem scan)
# =========================
  sca:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          format: sarif
          output: trivy.sarif


# =========================
# 3. IaC Security (Checkov)
# =========================
  iac:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov
        run: checkov -d . -o sarif > checkov.sarif || true


# =========================
# 4. Secrets scanning (TruffleHog)
# =========================
  secrets:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@v3.63.0
        with:
          path: .
          format: sarif
          output: trufflehog.sarif


# =========================
# 5. SBOM generation (Syft)
# =========================
  sbom:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM (CycloneDX)
        run: |
          docker run --rm -v ${PWD}:/workspace anchore/syft dir:/workspace -o cyclonedx-json > sbom.json


# =========================
# 6. Dockerfile Lint (Hadolint)
# =========================
  docker-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Hadolint
        run: |
          find . -name Dockerfile -exec sh -c 'cat {} | docker run --rm -i hadolint/hadolint' \;


# =========================
# 7. Container Security (Trivy images)
# =========================
  container-scan:
    runs-on: ubuntu-latest
    needs: [sast, sca, iac]

    permissions:
      contents: read
      security-events: write   # 🔥 FIX for SARIF upload

    strategy:
      matrix:
        service:
          - user-service
          - product-service
          - order-service
          - payment-service
          - notification-service
          - inventory-service

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/secureshop-${{ matrix.service }}:latest
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif


# =========================
# 8. Upload Security Results (Optional central step)
# =========================
  upload-results:
    needs: container-scan
    runs-on: ubuntu-latest

    steps:
      - name: Upload Trivy SARIF (example)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-user-service.sarif